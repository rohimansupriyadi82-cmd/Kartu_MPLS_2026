<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPLS 2026 PRO - React & Tailwind Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .font-nunito { font-family: 'Nunito', sans-serif; }
        
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { width: 0; height: 0; }

        @keyframes float-kids {
            0%, 100% { transform: translate(0, 0px); }
            50% { transform: translate(0, -4px); }
        }
        .anim-kids { animation: float-kids 3s ease-in-out infinite; }

        /* Optimasi Cetak F4 Landscape */
        @media print {
            @page { size: 330mm 215mm landscape; margin: 0; }
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                animation: none !important;
            }
            .no-print { display: none !important; }
            html, body { overflow: visible !important; height: auto !important; }
            body { background: white; margin: 0; padding: 0; }
            .h-screen { height: auto !important; }
            .app-shell { height: auto !important; overflow: visible !important; }
            main { overflow: visible !important; padding: 0 !important; }
            #printArea { display: block !important; }

            .kartu-b3 { width: 95mm !important; height: 124mm !important; position: relative !important; overflow: hidden !important; }
            .page-break { break-after: page; page-break-after: always; }
            
            .lembar-f4 {
                width: 330mm; height: 215mm;
                display: flex; flex-direction: row;
                justify-content: center; align-items: center;
                gap: 2mm;
                transform: none !important;
                break-after: page;
                page-break-after: always;
                break-inside: avoid;
                page-break-inside: avoid;
                clear: both;
                background: white !important;
                margin: 0; padding: 0;
            }
            .hal-f4 { gap: 2mm !important; }
            .lembar-f4:last-child, .hal-f4:last-child { break-after: auto; page-break-after: auto; }
            .kartu-print-border { border: 1px dashed #64748b !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const safeGetItem = (key) => {
            try {
                return localStorage.getItem(key);
            } catch (e) {
                return null;
            }
        };

        const safeRemoveItem = (key) => {
            try {
                localStorage.removeItem(key);
            } catch (e) {}
        };

        const safeJsonParse = (raw, fallback, keyForCleanup) => {
            if (!raw) return fallback;
            try {
                return JSON.parse(raw);
            } catch (e) {
                if (keyForCleanup) safeRemoveItem(keyForCleanup);
                return fallback;
            }
        };

        const dataUrlBytes = (dataUrl) => {
            if (!dataUrl) return 0;
            const commaIndex = dataUrl.indexOf(',');
            if (commaIndex === -1) return 0;
            const b64 = dataUrl.slice(commaIndex + 1);
            const padding = (b64.endsWith('==') ? 2 : b64.endsWith('=') ? 1 : 0);
            return Math.ceil((b64.length * 3) / 4) - padding;
        };

        const compressImageDataUrl = async (dataUrl, { maxBytes = 180000, maxWidth = 720, maxHeight = 720 } = {}) => {
            if (!dataUrl) return "";
            const img = await new Promise((resolve, reject) => {
                const i = new Image();
                i.onload = () => resolve(i);
                i.onerror = () => reject(new Error("Gagal memuat gambar"));
                i.src = dataUrl;
            });

            const baseScale = Math.min(maxWidth / img.width, maxHeight / img.height, 1);
            if (baseScale >= 1 && dataUrlBytes(dataUrl) <= maxBytes) return dataUrl;
            let scale = baseScale;

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d", { alpha: false });
            if (!ctx) return dataUrl;

            const render = (q) => {
                const w = Math.max(1, Math.round(img.width * scale));
                const h = Math.max(1, Math.round(img.height * scale));
                canvas.width = w;
                canvas.height = h;
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, w, h);
                ctx.drawImage(img, 0, 0, w, h);
                return canvas.toDataURL("image/jpeg", q);
            };

            let out = dataUrl;
            for (let attempt = 0; attempt < 10; attempt++) {
                let quality = 0.86;
                for (let qTry = 0; qTry < 8; qTry++) {
                    out = render(quality);
                    if (dataUrlBytes(out) <= maxBytes) return out;
                    quality -= 0.08;
                    if (quality < 0.35) break;
                }
                scale *= 0.85;
                if (scale < 0.25) break;
            }
            return out;
        };

        const THEMES = {
            original: { sky: 'from-[#38bdf8] to-[#bae6fd]', grass: 'bg-[#4ade80]', grassLine: 'border-[#22c55e]', nameBorder: 'border-[#3b82f6]', subBg: 'bg-[#3b82f6]', nameText: 'text-[#1e3a8a]' },
            modern:   { sky: 'from-[#3b82f6] to-[#93c5fd]', grass: 'bg-[#2dd4bf]', grassLine: 'border-[#0d9488]', nameBorder: 'border-[#0f766e]', subBg: 'bg-[#0f766e]', nameText: 'text-[#134e4a]' },
            energetic:{ sky: 'from-[#f97316] to-[#fde047]', grass: 'bg-[#fb923c]', grassLine: 'border-[#ea580c]', nameBorder: 'border-[#c2410c]', subBg: 'bg-[#ea580c]', nameText: 'text-[#7c2d12]' },
            forest:   { sky: 'from-[#10b981] to-[#a7f3d0]', grass: 'bg-[#84cc16]', grassLine: 'border-[#65a30d]', nameBorder: 'border-[#4d7c0f]', subBg: 'bg-[#4d7c0f]', nameText: 'text-[#14532d]' },
            royal:    { sky: 'from-[#6366f1] to-[#c7d2fe]', grass: 'bg-[#38bdf8]', grassLine: 'border-[#0ea5e9]', nameBorder: 'border-[#4f46e5]', subBg: 'bg-[#4f46e5]', nameText: 'text-[#1e1b4b]' },
            cherry:   { sky: 'from-[#f43f5e] to-[#fecdd3]', grass: 'bg-[#fb7185]', grassLine: 'border-[#e11d48]', nameBorder: 'border-[#be123c]', subBg: 'bg-[#be123c]', nameText: 'text-[#881337]' },
            lavender: { sky: 'from-[#a78bfa] to-[#e9d5ff]', grass: 'bg-[#c4b5fd]', grassLine: 'border-[#8b5cf6]', nameBorder: 'border-[#7c3aed]', subBg: 'bg-[#7c3aed]', nameText: 'text-[#3b0764]' },
            peach:    { sky: 'from-[#fdba74] to-[#ffe4e6]', grass: 'bg-[#86efac]', grassLine: 'border-[#22c55e]', nameBorder: 'border-[#fb923c]', subBg: 'bg-[#fb923c]', nameText: 'text-[#7c2d12]' },
            sunny:    { sky: 'from-[#facc15] to-[#fef9c3]', grass: 'bg-[#a3e635]', grassLine: 'border-[#65a30d]', nameBorder: 'border-[#ca8a04]', subBg: 'bg-[#ca8a04]', nameText: 'text-[#713f12]' }
        };

        const SchoolBuilding = () => (
            <svg viewBox="0 0 200 120" className="absolute bottom-[35px] left-1/2 -translate-x-1/2 w-[85%] z-[5] drop-shadow-md">
                <rect x="20" y="40" width="160" height="80" fill="#fef3c7" rx="4" />
                <rect x="20" y="75" width="160" height="5" fill="#f97316" />
                <rect x="10" y="30" width="180" height="15" fill="#f97316" rx="2" />
                <rect x="80" y="40" width="40" height="80" fill="#ffedd5" />
                <rect x="75" y="20" width="50" height="25" fill="#ea580c" />
                <polygon points="100,5 70,20 130,20" fill="#c2410c" />
                <rect x="35" y="45" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="60" y="45" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="125" y="45" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="150" y="45" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="35" y="85" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="60" y="85" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="125" y="85" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="150" y="85" width="15" height="20" fill="#3b82f6" rx="2" />
                <rect x="85" y="90" width="30" height="30" fill="#94a3b8" />
                <rect x="98" y="90" width="4" height="30" fill="#cbd5e1" />
            </svg>
        );

        const Card = ({ student, index, themeKey, schName, logo, onRemove, noPhoto }) => {
            const theme = THEMES[themeKey];
            const cardId = `card-${index}`;

            return (
                <div className="relative group shrink-0">
                    <div id={cardId} className={`kartu-b3 w-[297px] h-[420px] bg-gradient-to-b ${theme.sky} relative overflow-hidden rounded-[16px] shadow-2xl border border-slate-300 font-nunito flex flex-col items-center kartu-print-border bg-white`}>
                        <div className="absolute inset-0 z-0 flex items-center justify-center pointer-events-none">
                            <img src="./Anak_SD.png" className="w-[85%] h-[85%] object-contain opacity-[0.1]" crossOrigin="anonymous" alt="Anak SD Background" />
                        </div>
                        
                        <div className="absolute inset-0 z-[1] opacity-[0.25] pointer-events-none text-2xl">
                            <span className="absolute top-10 left-5 -rotate-45">✏️</span>
                            <span className="absolute top-24 left-2 rotate-12">📏</span>
                            <span className="absolute top-8 right-6 rotate-45">🔍</span>
                            <span className="absolute top-28 right-4 -rotate-12">📖</span>
                            <span className="absolute top-16 left-[35%] rotate-90">✂️</span>
                            <span className="absolute top-[80px] right-[30%] -rotate-45">🍃</span>
                        </div>

                        <div className="absolute z-[2] top-4 -left-6 w-24 h-12 bg-white rounded-full opacity-90 blur-[1px]"></div>
                        <div className="absolute z-[2] top-10 -right-8 w-32 h-16 bg-white rounded-full opacity-80 blur-[1px]"></div>
                        <div className="absolute z-[2] top-32 left-8 w-20 h-10 bg-white rounded-full opacity-70 blur-[1px]"></div>

                        <div className="absolute top-3 right-3 z-20">
                            <img src={logo} className="w-11 h-11 rounded-full border-[2.5px] border-white bg-white shadow-md object-contain" crossOrigin="anonymous" />
                        </div>

                        <div className="relative z-50 w-full h-[60px] mt-2">
                            <svg viewBox="0 0 300 60" className="w-full h-full drop-shadow-md">
                                <path id={`curve-${index}`} d="M 55 50 Q 150 10 245 50" fill="transparent" />
                                <text className="font-black text-[18px] tracking-widest uppercase" style={{ fill: '#f97316', stroke: 'white', strokeWidth: '6px', paintOrder: 'stroke' }}>
                                    <textPath href={`#curve-${index}`} startOffset="50%" textAnchor="middle">SELAMAT DATANG</textPath>
                                </text>
                            </svg>
                        </div>

                        <div className="relative z-10 flex flex-col items-center mt-[-10px] w-full px-4">
                            <h1 className="text-[75px] leading-none font-black text-[#ec4899] drop-shadow-lg tracking-wide" style={{ WebkitTextStroke: '4px white', paintOrder: 'stroke' }}>
                                MPLS
                            </h1>
                            <div className={`${theme.subBg} border-2 border-white px-5 py-1.5 rounded-full shadow-md mt-0 flex justify-center items-center`}>
                                <p className="text-white text-[9px] font-black uppercase tracking-widest text-center">
                                    Masa Pengenalan Lingkungan Sekolah
                                </p>
                            </div>
                        </div>

                        {/* KOTAK NAMA & TTL - DINAIKKAN PERSIS DI BAWAH JUDUL */}
                        <div className={`relative z-40 w-[85%] mt-3`}>
                            <div className={`bg-white rounded-[14px] shadow-lg border-b-[5px] ${theme.nameBorder} px-2 py-2.5 flex flex-col items-center justify-center min-h-[50px]`}>
                                <h2 className={`${theme.nameText} font-black text-[17px] leading-tight uppercase text-center w-full truncate tracking-wide`}>
                                    {student.nama}
                                </h2>
                            </div>
                            {student.ttl && (
                                <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 bg-[#f59e0b] text-white text-[9px] px-4 py-0.5 rounded-full border-[1.5px] border-white font-black tracking-widest shadow-md whitespace-nowrap">
                                    {student.ttl}
                                </div>
                            )}
                        </div>

                        {/* GAMBAR ANAK SD - POSISI TENGAH KHUSUS MODE TANPA FOTO */}
                        {noPhoto && (
                            <div className="absolute inset-x-0 bottom-[34px] z-20 flex justify-center pointer-events-none">
                                <img src="./Anak_SD.png" className="w-[70%] max-h-[150px] object-contain drop-shadow-lg anim-kids" crossOrigin="anonymous" alt="Anak SD" />
                            </div>
                        )}

                        {/* BINGKAI FOTO - MUNCUL JIKA NO-PHOTO MATI */}
                        {!noPhoto && (
                            <div className="relative z-30 mt-4 w-[90px] h-[120px] rounded-2xl border-[4px] border-white shadow-xl overflow-hidden bg-white/70 flex justify-center items-center overflow-hidden">
                                {student.foto ? (
                                    <img src={student.foto} className="w-full h-full object-cover" crossOrigin="anonymous" />
                                ) : (
                                    <span className="text-xs font-bold text-slate-400 text-center leading-tight">FOTO<br/>3x4</span>
                                )}
                            </div>
                        )}

                        {/* AREA BAWAH: GEDUNG, ANAK SD, TAMAN */}
                        <div className="absolute bottom-0 left-0 w-full h-[160px] z-[5] pointer-events-none flex flex-col justify-end">
                            <SchoolBuilding />
                            
                            {/* GAMBAR ANAK SD - DIKECILKAN & DITURUNKAN */}
                            {!noPhoto && (
                                <img src="./Anak_SD.png"
                                     className="absolute bottom-[30px] left-[10px] w-[38%] object-contain drop-shadow-lg z-20 anim-kids"
                                     crossOrigin="anonymous" alt="Anak SD" />
                            )}

                            <div className={`w-full h-[45px] ${theme.grass} relative z-10 border-t-[5px] ${theme.grassLine}`}>
                                <div className={`absolute -top-[18px] left-0 w-full h-[35px] ${theme.grass} rounded-[50%] border-t-[5px] ${theme.grassLine}`}></div>
                                <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-20 h-[45px] bg-[#d97706] opacity-[0.35]" style={{ clipPath: 'polygon(25% 0%, 75% 0%, 100% 100%, 0% 100%)' }}></div>
                            </div>
                        </div>

                        {/* NAMA SEKOLAH DI BAWAH */}
                        <div className="absolute bottom-2 w-full text-center z-30 px-2">
                            <p className="text-white text-[13px] font-black uppercase tracking-widest truncate" 
                               style={{ 
                                   textShadow: '2px 2px 0 #0f172a, -1px -1px 0 #0f172a, 1px -1px 0 #0f172a, -1px 1px 0 #0f172a, 0px 4px 5px rgba(0,0,0,0.8)' 
                               }}>
                                {schName}
                            </p>
                        </div>
                    </div>

                    {/* MENU HOVER */}
                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-50 flex flex-col gap-2 no-print">
                        <button onClick={() => onRemove(index)} className="w-9 h-9 bg-red-600 hover:bg-red-700 text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white text-sm" title="Hapus Data">✕</button>
                    </div>
                </div>
            );
        };

        // MAIN APPLICATION
        const App = () => {
            const [students, setStudents] = useState(() => {
                const parsed = safeJsonParse(safeGetItem('mpls_students'), [], 'mpls_students');
                return Array.isArray(parsed) ? parsed : [];
            });
            const [schLogo, setSchLogo] = useState(() => safeGetItem('mpls_logo') || "https://via.placeholder.com/60?text=LOGO");
            const [schName, setSchName] = useState(() => safeGetItem('mpls_schName') || "SDN MUARA BAKTI 01");
            const [themeKey, setThemeKey] = useState(() => {
                const saved = safeGetItem('mpls_theme') || "original";
                return THEMES[saved] ? saved : "original";
            });
            
            const [tempFoto, setTempFoto] = useState("");
            const [zipPhotos, setZipPhotos] = useState({});
            const quotaWarnedRef = useRef(false);
            const [showGuide, setShowGuide] = useState(false);
            
            const [noPhoto, setNoPhoto] = useState(false);

            const inNamaRef = useRef();
            const inTtlRef = useRef();
            const inFotoRef = useRef();

            // Auto Save & Quota Check
            useEffect(() => {
                try {
                    localStorage.setItem('mpls_students', JSON.stringify(students));
                    localStorage.setItem('mpls_logo', schLogo);
                    localStorage.setItem('mpls_schName', schName);
                    localStorage.setItem('mpls_theme', themeKey);
                } catch (e) {
                    if (!quotaWarnedRef.current) {
                        quotaWarnedRef.current = true;
                        alert("Penyimpanan browser penuh. Foto akan dikompresi maksimal.");
                    }
                }
            }, [students, schLogo, schName, themeKey]);

            const upLogo = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const r = new FileReader();
                    r.onload = (evt) => setSchLogo(evt.target.result);
                    r.readAsDataURL(file);
                }
            };

            const upFotoDraft = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setTempFoto("");
                    const r = new FileReader();
                    r.onload = async (evt) => {
                        const raw = evt.target.result;
                        try {
                            const compressed = await compressImageDataUrl(raw, { maxBytes: 180000, maxWidth: 400, maxHeight: 400 });
                            setTempFoto(compressed);
                        } catch (err) {
                            setTempFoto(raw);
                        }
                    };
                    r.readAsDataURL(file);
                }
            };

            const addManual = () => {
                const nama = inNamaRef.current.value.toUpperCase().trim();
                const ttl = inTtlRef.current.value.toUpperCase().trim();
                if (!nama) return alert("Harap isi nama siswa!");
                
                const foto = tempFoto;
                setTempFoto("");
                setStudents(prevStudents => [...prevStudents, { nama, ttl, foto }]);
                inNamaRef.current.value = "";
                inTtlRef.current.value = "";
                if(inFotoRef.current) inFotoRef.current.value = "";
            };

            const importZip = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const zip = await JSZip.loadAsync(file);
                const newPhotos = { ...zipPhotos };
                for (let name in zip.files) {
                    if (!zip.files[name].dir) {
                        const blob = await zip.files[name].async("blob");
                        const b64 = await new Promise(res => {
                            const r = new FileReader(); r.onloadend = () => res(r.result); r.readAsDataURL(blob);
                        });
                        const key = name.split('/').pop().split('.').shift().toUpperCase().trim();
                        try {
                            newPhotos[key] = await compressImageDataUrl(b64, { maxBytes: 180000, maxWidth: 400, maxHeight: 400 });
                        } catch (err) {
                            newPhotos[key] = b64;
                        }
                    }
                }
                setZipPhotos(newPhotos);
                setStudents(prev => prev.map(s => newPhotos[s.nama] ? { ...s, foto: newPhotos[s.nama] } : s));
                alert("Foto ZIP berhasil dipasangkan!");
            };

            const importXl = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = (evt) => {
                    const wb = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    const newStudents = data.map(row => {
                        const nama = (row.Nama || row.nama || "").toUpperCase().trim();
                        return { nama, ttl: (row.TTL || row.ttl || row.Info || "").toUpperCase(), foto: zipPhotos[nama] || "" };
                    });
                    setStudents(newStudents);
                };
                r.readAsArrayBuffer(file);
            };

            const clearAllData = () => {
                if (confirm("PERINGATAN: Menghapus semua data siswa secara permanen?")) {
                    setStudents([]);
                    localStorage.removeItem('mpls_students');
                }
            };

            const pagedData = [];
            for (let i = 0; i < students.length; i += 3) {
                pagedData.push({ items: students.slice(i, i + 3), startIndex: i });
            }

            return (
                <div className="app-shell flex flex-col md:flex-row h-screen overflow-hidden">
                    <aside className="no-print w-full md:w-85 lg:w-96 bg-[#0f172a] text-white flex flex-col shrink-0 shadow-2xl z-50">
                        <div className="p-6 border-b border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-pink-500 rounded-lg"><span className="text-2xl">🎨</span></div>
                                <div>
                                    <h1 className="font-black text-xl text-white">MPLS <span className="text-pink-400">2026</span></h1>
                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest leading-none">Rohiman Supriyadi</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto hide-scrollbar p-6 space-y-6">
                            <section>
                                <label className="text-[11px] font-bold text-slate-300 uppercase tracking-wider mb-1.5 block">⚙️ Pilih Tema</label>
                                <select value={themeKey} onChange={(e) => setThemeKey(e.target.value)} className="w-full bg-white text-black font-bold p-3 rounded-lg border-2 border-slate-700 outline-none cursor-pointer mb-3">
                                    <option value="original">Sky Blue (Sesuai Referensi)</option>
                                    <option value="modern">Ocean Deep Blue</option>
                                    <option value="energetic">Sunset Orange</option>
                                    <option value="forest">Jungle Green</option>
                                    <option value="royal">Royal Indigo</option>
                                    <option value="cherry">Cherry Pink</option>
                                    <option value="lavender">Lavender Dream</option>
                                    <option value="peach">Peach Blossom</option>
                                    <option value="sunny">Sunny Yellow</option>
                                </select>
                                
                                <label className="flex items-center gap-3 cursor-pointer p-3 bg-slate-800 rounded-lg border border-slate-700 hover:bg-slate-700 transition">
                                    <input type="checkbox" checked={noPhoto} onChange={(e) => setNoPhoto(e.target.checked)} className="w-5 h-5 accent-pink-500" />
                                    <span className="text-xs font-black text-slate-200 uppercase tracking-wider">Mode Tanpa Foto</span>
                                </label>
                            </section>

                            <section>
                                <label className="text-[11px] font-bold text-slate-300 uppercase tracking-wider mb-1.5 block">🏫 Profil Sekolah</label>
                                <input type="text" value={schName} onChange={(e) => setSchName(e.target.value)} placeholder="Nama Sekolah..." className="w-full bg-white text-black font-bold p-3 rounded-lg border-2 border-slate-700 outline-none mb-3 uppercase" />
                                
                                <div className="flex items-center gap-3">
                                    <label className="flex-1 flex flex-col items-center py-2 bg-slate-800 border border-dashed border-slate-600 rounded-lg cursor-pointer hover:bg-slate-700 transition">
                                        <span className="text-[10px] font-bold">UPLOAD LOGO</span>
                                        <input type="file" accept="image/*" className="hidden" onChange={upLogo} />
                                    </label>
                                    <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center overflow-hidden border-2 border-slate-700 shrink-0">
                                        <img src={schLogo} className="w-full h-full object-contain p-1" />
                                    </div>
                                </div>
                            </section>

                            <hr className="border-slate-800" />

                            <section className="bg-slate-900/50 p-4 rounded-xl border border-slate-800 space-y-3">
                                <label className="text-[11px] font-bold text-yellow-500 uppercase tracking-wider block">✍️ Input Siswa Baru</label>
                                <input type="text" ref={inNamaRef} placeholder="Nama Lengkap" className="w-full bg-white text-black font-bold p-3 rounded-lg border-2 border-slate-700 outline-none" />
                                <input type="text" ref={inTtlRef} placeholder="Kota, dd-mm-yyyy" className="w-full bg-white text-black font-bold p-3 rounded-lg border-2 border-slate-700 outline-none" />
                                
                                <div className="flex gap-2">
                                    <label className="flex-1 flex items-center justify-center gap-2 px-3 py-2 bg-slate-800 rounded-lg cursor-pointer hover:bg-slate-700 transition border border-slate-700">
                                        <span className="text-[11px] font-bold">📸 Foto</span>
                                        <input type="file" ref={inFotoRef} accept="image/*" className="hidden" onChange={upFotoDraft} />
                                    </label>
                                    <button onClick={addManual} className="flex-[2] bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold text-xs shadow-lg active:scale-95 transition">
                                        ➕ TAMBAHKAN
                                    </button>
                                </div>
                                {tempFoto && <p className="text-[9px] text-emerald-400 text-center font-bold">✓ Foto terpilih siap ditambahkan</p>}
                            </section>

                            <section>
                                <label className="text-[11px] font-bold text-slate-300 uppercase tracking-wider mb-1.5 block">📂 Import Massal</label>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => document.getElementById('xlIn').click()} className="flex flex-col items-center gap-1 bg-emerald-900/40 border border-emerald-600/50 p-3 rounded-xl hover:bg-emerald-800/60 transition">
                                        <span className="text-xl">📊</span><span className="text-[10px] font-bold">EXCEL</span>
                                    </button>
                                    <button onClick={() => document.getElementById('zipIn').click()} className="flex flex-col items-center gap-1 bg-indigo-900/40 border border-indigo-600/50 p-3 rounded-xl hover:bg-indigo-800/60 transition">
                                        <span className="text-xl">📦</span><span className="text-[10px] font-bold">ZIP FOTO</span>
                                    </button>
                                    <input type="file" id="xlIn" className="hidden" accept=".xlsx, .xls" onChange={importXl} />
                                    <input type="file" id="zipIn" className="hidden" accept=".zip" onChange={importZip} />
                                </div>
                            </section>

                            <button onClick={() => setShowGuide(true)} className="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-black text-xs shadow-lg transition flex items-center justify-center gap-2 border border-slate-700">
                                📖 Panduan Pengguna
                            </button>
                            
                            <button onClick={clearAllData} className="w-full text-xs text-red-400 font-bold hover:text-red-300 transition mt-4 underline text-center">HAPUS SEMUA DATA PERMANEN</button>
                        </div>

                        <div className="p-6 bg-[#0f172a] border-t border-slate-800 shadow-2xl">
                            <button onClick={() => window.print()} className="w-full bg-pink-600 hover:bg-pink-500 py-4 rounded-2xl font-black text-xl shadow-[0_6px_0_rgb(190,24,93)] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center gap-3">
                                🖨️ CETAK BATCH F4
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-10 overflow-y-auto hide-scrollbar bg-slate-200 w-full relative">
                        <div className="no-print max-w-6xl mx-auto mb-6 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-300">
                            <div>
                                <h2 className="text-xl font-black text-slate-800 uppercase tracking-tight">Realtime Preview F4</h2>
                                <p className="text-[11px] text-slate-500 font-bold mt-1">Arahkan kursor ke kartu untuk melihat fitur Download individu (PNG/PDF).</p>
                            </div>
                            <div className="bg-slate-100 px-5 py-2 rounded-full shadow-inner text-xs font-bold text-slate-600 border border-slate-200">
                                Total Siswa: <span className="text-pink-600 text-lg ml-1 font-black">{students.length}</span>
                            </div>
                        </div>

                        <div id="printArea" className="flex flex-col items-center">
                            {students.length === 0 ? (
                                <div className="mt-20 text-slate-400 font-bold flex flex-col items-center gap-3">
                                    <span className="text-5xl opacity-50">📭</span>
                                    Belum ada data siswa yang diinput.
                                </div>
                            ) : (
                                pagedData.map((page, pageIndex) => (
                                    <div key={pageIndex} className="page-break lembar-f4 hal-f4 bg-white md:shadow-xl md:border md:border-slate-300 md:mb-10 md:p-[10mm] flex flex-row justify-center items-center gap-[2mm] scale-[0.6] sm:scale-[0.8] md:scale-100 origin-top">
                                        {page.items.map((student, idx) => (
                                            <Card 
                                                key={page.startIndex + idx} 
                                                index={page.startIndex + idx} 
                                                student={student} 
                                                themeKey={themeKey} 
                                                schName={schName} 
                                                logo={schLogo} 
                                                noPhoto={noPhoto}
                                                onRemove={(i) => {
                                                    if(confirm(`Hapus data ${students[i].nama}?`)) {
                                                        const newS = [...students];
                                                        newS.splice(i, 1);
                                                        setStudents(newS);
                                                    }
                                                }}
                                            />
                                        ))}
                                    </div>
                                ))
                            )}
                        </div>
                    </main>

                    {showGuide && (
                        <div className="no-print fixed inset-0 z-[999] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/60" onClick={() => setShowGuide(false)}></div>
                            <div className="relative w-full max-w-xl bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                                <div className="flex items-center justify-between px-5 py-4 bg-slate-50 border-b border-slate-200">
                                    <h3 className="font-black text-slate-800">📖 Panduan Pengguna</h3>
                                    <button onClick={() => setShowGuide(false)} className="w-9 h-9 rounded-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-black flex items-center justify-center">✕</button>
                                </div>
                                <div className="px-5 py-4 text-sm text-slate-700 space-y-3">
                                    <div><span className="font-black">Langkah 1:</span> Isi Nama dan Info Siswa secara manual atau Import via Excel.</div>
                                    <div><span className="font-black">Langkah 2:</span> Upload foto siswa (Sistem akan otomatis mengecilkan ukuran foto agar aplikasi lancar).</div>
                                    <div><span className="font-black">Langkah 3:</span> Gunakan fitur Zip Foto jika ingin memasangkan foto secara massal berdasarkan nama.</div>
                                    <div><span className="font-black">Langkah 4:</span> Cek preview. Kartu akan otomatis terbagi menjadi 3 kartu per halaman F4.</div>
                                    <div><span className="font-black">Langkah 5:</span> Klik Cetak Batch dan pastikan setelan printer adalah Landscape dan ukuran kertas F4/Legal.</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootEl = document.getElementById('root');
        const root = ReactDOM.createRoot(rootEl);
        const showFatal = (err) => {
            try {
                rootEl.innerHTML = '<div style="font-family:system-ui,Segoe UI,Arial,sans-serif;padding:16px;max-width:720px;margin:24px auto;background:#fff;border:1px solid #e2e8f0;border-radius:12px;"><h2 style="margin:0 0 8px 0;color:#0f172a;">Aplikasi gagal berjalan</h2><div style="color:#334155;font-size:14px;line-height:1.4;">Biasanya ini terjadi karena data LocalStorage rusak/terlalu besar atau browser memblokir resource CDN. Coba: hapus data situs (LocalStorage) lalu refresh.</div></div>';
            } catch (e) {}
        };
        window.addEventListener('unhandledrejection', (e) => showFatal(e && e.reason ? e.reason : e));
        window.addEventListener('error', (e) => showFatal(e && e.error ? e.error : e));
        try {
            root.render(<App />);
        } catch (e) {
            showFatal(e);
        }
    </script>
</body>
</html>
